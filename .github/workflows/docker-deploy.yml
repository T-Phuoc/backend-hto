name: Docker CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  COMPOSE_FILE: docker-compose.cicd.yml
  DOCKERFILE: Dockerfile.backend-hto
  DEFAULT_APP_PORT: "3006"
  DEFAULT_CONTAINER_PORT: "8080"
  DEFAULT_COMPOSE_PROJECT_NAME: backend-hto-qlnb
  DEFAULT_APP_CONTAINER_NAME: backend-hto-qlnb-app

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy by SSH
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: preflight
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || { [ -z "$DEPLOY_SSH_KEY" ] && [ -z "$DEPLOY_SSH_KEY_B64" ]; } || [ -z "$DEPLOY_PATH" ]; then
            echo "::notice::Missing DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY or DEPLOY_SSH_KEY_B64, or DEPLOY_PATH. Image was pushed, deploy skipped."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: steps.preflight.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$DEPLOY_SSH_KEY_B64" ]; then
            printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file
        if: steps.preflight.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp "$COMPOSE_FILE" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"

      - name: Deploy container
        if: steps.preflight.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
          APP_PORT: ${{ vars.APP_PORT || env.DEFAULT_APP_PORT }}
          CONTAINER_PORT: ${{ vars.CONTAINER_PORT || env.DEFAULT_CONTAINER_PORT }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || env.DEFAULT_COMPOSE_PROJECT_NAME }}
          APP_CONTAINER_NAME: ${{ vars.APP_CONTAINER_NAME || env.DEFAULT_APP_CONTAINER_NAME }}
          COMPOSE_PROFILES: ${{ vars.COMPOSE_PROFILES }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -n "$GHCR_PAT" ]; then
            printf '%s\n' "$GHCR_PAT" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi

          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
             APP_IMAGE='$APP_IMAGE' \
             APP_PORT='$APP_PORT' \
             CONTAINER_PORT='$CONTAINER_PORT' \
             COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' \
             APP_CONTAINER_NAME='$APP_CONTAINER_NAME' \
             COMPOSE_PROFILES='$COMPOSE_PROFILES' \
             docker compose pull app && \
             APP_IMAGE='$APP_IMAGE' \
             APP_PORT='$APP_PORT' \
             CONTAINER_PORT='$CONTAINER_PORT' \
             COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' \
             APP_CONTAINER_NAME='$APP_CONTAINER_NAME' \
             COMPOSE_PROFILES='$COMPOSE_PROFILES' \
             docker compose up -d --remove-orphans"
